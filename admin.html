<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Erni's - ForeverYoung</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>

  <header>
    <a href="index.html" class="header-brand">
      <img src="assets/images/ernislogo.svg" alt="Erni's - ForeverYoung" />
      <span>Erni's - ForeverYoung</span>
    </a>
    <nav>
      <ul>
        <li><a href="index.html">START</a></li>
        <li><a href="details.html">DETAILS</a></li>
        <li><a href="anmeldung.html">ANMELDUNG</a></li>
        <li><a href="verwalten.html">VERWALTEN</a></li>
      </ul>
    </nav>
  </header>

  <div class="page-body">
    <main>

      <div class="divider-heading">
        <h2>Admin-Übersicht</h2>
      </div>

      <section class="form-section">
        <div class="container">

          <div id="login-wrapper" style="max-width:420px;margin:0 auto;">
            <h3>Passwort</h3>
            <div class="form-alert" id="login-error" role="alert"></div>
            <form id="login-form" novalidate>
              <div class="form-group">
                <label for="admin-password">Admin-Passwort</label>
                <input type="password" id="admin-password" placeholder="Admin-Passwort" autocomplete="current-password" required />
              </div>
              <button type="submit" class="btn-submit" id="login-btn">Anmelden</button>
            </form>
          </div>

          <div id="admin-wrapper" style="display:none;">
            <div class="admin-toolbar">
              <div class="admin-totals" id="admin-totals"></div>
              <div class="admin-actions">
                <button type="button" class="btn btn-outline" id="refresh-btn">Aktualisieren</button>
                <button type="button" class="btn btn-primary" id="csv-btn">CSV herunterladen</button>
              </div>
            </div>

            <div class="admin-table-wrap">
              <table class="admin-table" id="admin-table">
                <thead>
                  <tr>
                    <th>Code</th>
                    <th>Status</th>
                    <th>Name</th>
                    <th>E-Mail</th>
                    <th>Telefon</th>
                    <th>Begleitung</th>
                    <th>Zimmer</th>
                    <th>Bus</th>
                    <th>Mitteilung</th>
                    <th>Angemeldet</th>
                    <th>Geändert</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>

        </div>
      </section>

    </main>

    <footer>
      <div class="footer-inner">
        <img class="footer-logo" src="assets/images/ernislogo.svg" alt="Erni's - ForeverYoung" />
        <p class="footer-name">Othmar und Christin Erni</p>
        <p class="footer-location">Adligenswil, Schweiz</p>
        <p class="footer-copy">Copyright Erni's 2025, Alle Rechte vorbehalten</p>
      </div>
    </footer>
  </div>

  <script src="assets/config.js"></script>
  <script src="assets/api.js"></script>
  <script>
    (function () {
      const $ = id => document.getElementById(id);
      let password = '';
      let records = [];

      function fmtDate(s) {
        if (!s) return '';
        const d = new Date(s);
        if (isNaN(d)) return s;
        return d.toLocaleString('de-CH', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
      }
      function yes(v) { return (v === true || v === 'true') ? 'Ja' : 'Nein'; }
      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
      }

      function renderTotals(t) {
        $('admin-totals').innerHTML = `
          <span class="admin-pill admin-pill-primary">Gäste gesamt: <strong>${t.guests != null ? t.guests : t.active}</strong></span>
          <span class="admin-pill">Anmeldungen aktiv: <strong>${t.active}</strong></span>
          <span class="admin-pill">Mit Begleitung: <strong>${t.partner || 0}</strong></span>
          <span class="admin-pill">Zimmer: <strong>${t.zimmer}</strong></span>
          <span class="admin-pill">Bus: <strong>${t.bus}</strong></span>
          <span class="admin-pill admin-pill-muted">Storniert: <strong>${t.cancelled}</strong></span>
        `;
      }

      function renderRows(rows) {
        const tbody = $('admin-table').querySelector('tbody');
        if (!rows.length) {
          tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;color:#777;padding:24px;">Noch keine Anmeldungen.</td></tr>';
          return;
        }
        tbody.innerHTML = rows.map(r => {
          const partnerCell = (r.partner === true || r.partner === 'true')
            ? 'Ja' + (r.partnerName ? ' — ' + escapeHtml(r.partnerName) : '')
            : 'Nein';
          return `
            <tr class="${r.status === 'cancelled' ? 'row-cancelled' : ''}">
              <td class="mono">${escapeHtml(r.code)}</td>
              <td>${r.status === 'cancelled' ? '<span class="tag tag-muted">storniert</span>' : '<span class="tag tag-ok">aktiv</span>'}</td>
              <td>${escapeHtml(r.vorname)} ${escapeHtml(r.nachname)}</td>
              <td><a href="mailto:${encodeURIComponent(r.email)}">${escapeHtml(r.email)}</a></td>
              <td>${escapeHtml(r.telefon)}</td>
              <td>${partnerCell}</td>
              <td>${yes(r.zimmer)}</td>
              <td>${yes(r.bus)}</td>
              <td class="col-note">${escapeHtml(r.mitteilung)}</td>
              <td>${fmtDate(r.createdAt)}</td>
              <td>${fmtDate(r.updatedAt)}</td>
            </tr>
          `;
        }).join('');
      }

      async function load() {
        try {
          const res = await ErniAPI.apiPost({ action: 'adminList', password });
          if (!res.ok) throw new Error(res.error || 'Laden fehlgeschlagen.');
          records = res.records;
          renderTotals(res.totals);
          renderRows(records);
        } catch (err) {
          alert(err.message || String(err));
        }
      }

      function toCSV(rows) {
        const headers = ['code','status','vorname','nachname','email','telefon','partner','partnerName','zimmer','bus','mitteilung','createdAt','updatedAt'];
        const esc = v => {
          const s = String(v == null ? '' : v);
          return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
        };
        const lines = [headers.join(',')];
        rows.forEach(r => lines.push(headers.map(h => esc(r[h])).join(',')));
        return lines.join('\n');
      }

      $('login-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        ErniAPI.showError($('login-error'), '');
        password = $('admin-password').value;
        if (!password) return;
        ErniAPI.setBusy($('login-btn'), true, 'Prüfe…');
        try {
          const res = await ErniAPI.apiPost({ action: 'adminList', password });
          if (!res.ok) throw new Error(res.error || 'Passwort falsch.');
          records = res.records;
          renderTotals(res.totals);
          renderRows(records);
          $('login-wrapper').style.display = 'none';
          $('admin-wrapper').style.display = 'block';
        } catch (err) {
          ErniAPI.showError($('login-error'), err.message || String(err));
        } finally {
          ErniAPI.setBusy($('login-btn'), false);
        }
      });

      $('refresh-btn').addEventListener('click', load);
      $('csv-btn').addEventListener('click', function () {
        const csv = toCSV(records);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const ts = new Date().toISOString().slice(0,10);
        a.href = url;
        a.download = 'erni-anmeldungen-' + ts + '.csv';
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
      });
    })();
  </script>
</body>
</html>
